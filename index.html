<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BBO ROLODEX</title>
    <meta name="description" content="BBO Personal CRM — Capture Everything. Lose Nothing.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BBO Rolodex">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bbo': '#FF1493',
                        'bbo-light': '#FF69B4',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            color: #fff;
            overscroll-behavior: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .drag-glow {
            border-color: #FF1493 !important;
            background: rgba(255, 20, 147, 0.08) !important;
            box-shadow: inset 0 0 60px rgba(255, 20, 147, 0.15);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease;
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(8px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .card-in {
            animation: cardIn 0.35s ease;
        }

        .toast-container {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 999;
            transition: all 0.4s ease;
            opacity: 0;
            pointer-events: none;
        }

        .toast-container.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .bottom-nav {
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }

        .staged-area {
            position: relative;
        }

        .staged-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .staged-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 14px 16px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 60%, transparent);
            border-radius: 0 0 16px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .label-pill input:checked + div {
            border-color: #FF1493;
            background: rgba(255, 20, 147, 0.12);
            color: #FF1493;
        }

        .state-btn {
            background: linear-gradient(135deg, rgba(255, 20, 147, 0.08), rgba(255, 20, 147, 0.03));
            border: 1px solid rgba(255, 20, 147, 0.25);
            transition: all 0.2s ease;
        }

        .state-btn:active {
            transform: scale(0.97);
        }

        .state-btn:hover {
            border-color: rgba(255, 20, 147, 0.5);
            background: rgba(255, 20, 147, 0.12);
        }
    </style>
</head>

<body class="h-screen flex flex-col overflow-hidden">

    <!-- TOAST -->
    <div class="toast-container" id="toast">
        <div
            class="bg-gray-900 border border-gray-700 rounded-xl px-5 py-3 text-sm font-semibold flex items-center gap-2 shadow-2xl">
            <span id="toastIcon">✅</span>
            <span id="toastMsg">Saved!</span>
        </div>
    </div>

    <!-- HEADER -->
    <header
        class="px-5 py-4 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5 z-30 sticky top-0">
        <div>
            <h1 class="text-xl font-black tracking-tight">BBO <span class="text-bbo">ROLODEX</span></h1>
            <p class="text-[10px] text-gray-500 font-semibold tracking-widest uppercase">Capture everything. Lose
                nothing.</p>
        </div>
        <div class="flex items-center gap-3">
            <span class="bg-bbo text-white text-[11px] font-bold px-2.5 py-1 rounded-full min-w-[28px] text-center"
                id="leadCount">0</span>
            <button id="settingsBtn" class="p-2 rounded-full hover:bg-white/10 transition text-gray-400">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3" />
                    <path
                        d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1 overflow-y-auto no-scrollbar pb-20">

        <!-- TAB: CAPTURE -->
        <div id="captureTab" class="p-5 space-y-4">

            <!-- NJ / NY Quick Access -->
            <div class="grid grid-cols-2 gap-3">
                <button class="state-btn rounded-xl p-4 flex flex-col items-center gap-2" onclick="filterByState('NJ')">
                    <span class="text-2xl">🏙️</span>
                    <span class="text-sm font-bold text-white">NJ Contacts</span>
                    <span class="text-[10px] text-gray-500 font-semibold" id="njCount">0 contacts</span>
                </button>
                <button class="state-btn rounded-xl p-4 flex flex-col items-center gap-2" onclick="filterByState('NY')">
                    <span class="text-2xl">🗽</span>
                    <span class="text-sm font-bold text-white">NY Contacts</span>
                    <span class="text-[10px] text-gray-500 font-semibold" id="nyCount">0 contacts</span>
                </button>
            </div>

            <label id="dropZone"
                class="group relative flex flex-col items-center justify-center h-52 rounded-2xl border-2 border-dashed border-gray-800 bg-gray-900/40 hover:bg-gray-800/40 transition-all cursor-pointer overflow-hidden">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <div class="z-10 flex flex-col items-center gap-3 transition-transform group-hover:scale-105">
                    <div class="p-4 rounded-full bg-gray-800/80 group-hover:bg-bbo/20 transition-colors">
                        <svg class="w-8 h-8 text-gray-500 group-hover:text-bbo transition-colors" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div class="text-center">
                        <span class="text-lg font-bold text-gray-300 block">SCAN DM / SCREENSHOT</span>
                        <span class="text-[11px] text-gray-600 font-medium">Tap to select from photos or camera</span>
                    </div>
                </div>
            </label>

            <div id="stagedArea" class="hidden staged-area animate-slide-up">
                <img id="stagedImg" class="staged-img" alt="Screenshot preview">
                <div class="staged-overlay">
                    <button
                        class="px-3 py-1.5 rounded-full bg-white/10 text-white text-xs font-semibold hover:bg-white/20 transition"
                        onclick="clearStaged()">✕ Clear</button>
                    <span class="text-[10px] text-gray-400 font-medium">Ready to parse</span>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">📝 YOUR NOTES
                    <span class="text-gray-700">(optional)</span></label>
                <textarea id="manualNotes" rows="3"
                    class="w-full bg-gray-900/60 border border-gray-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-bbo transition leading-relaxed placeholder-gray-600"
                    placeholder="Type anything you know about this person..."></textarea>
            </div>

            <button id="parseBtn"
                class="w-full py-3.5 rounded-xl bg-gradient-to-r from-bbo to-bbo-light hover:opacity-90 text-white font-bold text-sm transition shadow-lg shadow-pink-500/20 flex justify-center items-center gap-2 active:scale-[0.98] disabled:opacity-30 disabled:cursor-not-allowed"
                disabled onclick="submitCapture()">
                ⚡ PARSE WITH AI
            </button>
            <p id="parseHint" class="text-center text-[10px] text-gray-600">Drop a screenshot above to enable parsing
            </p>
        </div>

        <!-- TAB: LEADS -->
        <div id="leadsTab" class="hidden p-5 space-y-4">
            <div class="flex gap-2 items-center">
                <div class="relative flex-1">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search name, handle, notes..."
                        class="w-full bg-gray-900/60 border border-gray-800 rounded-xl py-2.5 pl-10 pr-4 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-bbo transition">
                </div>
                <button onclick="openContactModal()"
                    class="shrink-0 w-10 h-10 rounded-xl bg-bbo flex items-center justify-center text-white font-bold text-lg hover:opacity-90 transition active:scale-95"
                    title="Add contact manually">+</button>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                <button
                    class="filter-chip active shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border transition"
                    data-filter="all">All</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="hot">🔥 Hot</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="warm">🟡 Warm</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="cold">🔵 Cold</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="NJ">🏙️ NJ</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="NY">🗽 NY</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Lead">Lead</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Creator">Creator</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Content Day">Content Day</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Brand Ambassador">Ambassador</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Camera People">Camera</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="BBO Assistants">Assistants</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Partner">Partner</button>
                <button
                    class="filter-chip shrink-0 px-3.5 py-1.5 rounded-full text-xs font-semibold border border-gray-800 text-gray-500 transition"
                    data-filter="Event">Event</button>
            </div>
            <div id="leadsGrid" class="space-y-3"></div>
        </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav
        class="bottom-nav fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-xl border-t border-white/5 z-30 flex">
        <button id="navCapture" class="flex-1 flex flex-col items-center gap-1 py-3 text-bbo transition"
            onclick="switchTab('capture')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
            </svg>
            <span class="text-[10px] font-bold">CAPTURE</span>
        </button>
        <button id="navLeads" class="flex-1 flex flex-col items-center gap-1 py-3 text-gray-600 transition"
            onclick="switchTab('leads')">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-[10px] font-bold">LEADS</span>
        </button>
        <button class="flex-1 flex flex-col items-center gap-1 py-3 text-gray-600 transition" onclick="exportCSV()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span class="text-[10px] font-bold">EXPORT</span>
        </button>
    </nav>

    <!-- LOADING -->
    <div id="loadingState"
        class="hidden fixed inset-0 z-50 bg-black/90 flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-14 h-14 border-[3px] border-bbo border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-bbo font-bold animate-pulse text-base tracking-wide">PARSING INTEL...</p>
    </div>

    <!-- CONTACT MODAL (used for parsed results, manual add, and editing) -->
    <div id="contactModal"
        class="hidden fixed inset-0 z-40 bg-black/95 flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div
            class="w-full max-w-md bg-[#0D0D0D] border border-gray-800 rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden animate-slide-up max-h-[90vh] overflow-y-auto no-scrollbar">
            <div
                class="p-4 border-b border-gray-800/50 flex justify-between items-center sticky top-0 bg-[#0D0D0D] z-10">
                <h2 class="text-base font-bold flex items-center gap-2" id="modalTitle"><span
                        class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>NEW CONTACT</h2>
                <button id="closeModal" class="p-1 text-gray-500 hover:text-white transition"><svg width="20"
                        height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg></button>
            </div>
            <div class="p-5 space-y-4">
                <div id="modalPreviewWrap" class="hidden"><img id="modalPreview"
                        class="w-full h-40 object-cover rounded-xl border border-gray-800"></div>

                <!-- Name -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Name <span class="text-bbo">*</span></label>
                    <input type="text" id="resultName"
                        class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 px-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                        placeholder="Display name or real name">
                </div>

                <!-- Handle -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Handle <span class="text-gray-700">(optional)</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-bbo font-bold text-sm">@</span>
                        <input type="text" id="resultHandle"
                            class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 pl-8 pr-3 text-white text-sm focus:outline-none focus:border-bbo transition font-mono"
                            placeholder="username">
                    </div>
                </div>

                <!-- Phone + Email row -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Phone</label>
                        <input type="tel" id="resultPhone"
                            class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 px-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                            placeholder="(555) 123-4567">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Email</label>
                        <input type="email" id="resultEmail"
                            class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 px-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                            placeholder="email@example.com">
                    </div>
                </div>

                <!-- City + State row -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">City</label>
                        <input type="text" id="resultCity"
                            class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 px-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                            placeholder="Newark">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">State</label>
                        <input type="text" id="resultState"
                            class="w-full bg-gray-900 border border-gray-800 rounded-xl py-2.5 px-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                            placeholder="NJ">
                    </div>
                </div>

                <!-- Labels (multi-select pills) -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Labels <span class="text-gray-700">(select all that apply)</span></label>
                    <div class="flex flex-wrap gap-2" id="labelPills"></div>
                </div>

                <!-- Urgency -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Urgency</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="cursor-pointer"><input type="radio" name="urgency" value="hot"
                                class="hidden peer">
                            <div
                                class="text-center py-2 rounded-xl border border-gray-800 text-xs font-bold text-gray-500 peer-checked:border-bbo peer-checked:bg-bbo/10 peer-checked:text-bbo transition">
                                🔥 HOT</div>
                        </label>
                        <label class="cursor-pointer"><input type="radio" name="urgency" value="warm"
                                class="hidden peer" checked>
                            <div
                                class="text-center py-2 rounded-xl border border-gray-800 text-xs font-bold text-gray-500 peer-checked:border-yellow-500 peer-checked:bg-yellow-500/10 peer-checked:text-yellow-400 transition">
                                🟡 WARM</div>
                        </label>
                        <label class="cursor-pointer"><input type="radio" name="urgency" value="cold"
                                class="hidden peer">
                            <div
                                class="text-center py-2 rounded-xl border border-gray-800 text-xs font-bold text-gray-500 peer-checked:border-blue-500 peer-checked:bg-blue-500/10 peer-checked:text-blue-400 transition">
                                🔵 COLD</div>
                        </label>
                    </div>
                </div>

                <!-- Notes -->
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Context / Notes</label>
                    <textarea id="resultContext" rows="3"
                        class="w-full bg-gray-900 border border-gray-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-bbo transition leading-relaxed"
                        placeholder="What did they want? Any extra context..."></textarea>
                </div>
            </div>
            <div class="p-4 border-t border-gray-800/50 flex gap-3 sticky bottom-0 bg-[#0D0D0D]">
                <button id="copyBtn"
                    class="flex-1 py-3 rounded-xl bg-gray-900 hover:bg-gray-800 text-white font-bold text-sm transition flex justify-center items-center gap-2 border border-gray-800">📋
                    COPY</button>
                <button id="saveBtn"
                    class="flex-[2] py-3 rounded-xl bg-gradient-to-r from-bbo to-bbo-light hover:opacity-90 text-white font-bold text-sm transition shadow-lg shadow-pink-500/20 flex justify-center items-center gap-2">💾
                    SAVE TO ROSTER</button>
            </div>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settingsModal"
        class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-5 backdrop-blur-sm">
        <div class="w-full max-w-sm bg-[#0D0D0D] rounded-2xl p-6 border border-gray-800 animate-slide-up">
            <h3 class="text-lg font-bold mb-5">⚙️ Settings</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Gemini API
                        Key</label>
                    <input type="password" id="apiKeyInput"
                        class="w-full bg-black border border-gray-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                        placeholder="Paste your API key...">
                    <p class="text-[10px] text-gray-600 mt-1">Free from <a href="https://aistudio.google.com/apikey"
                            target="_blank" class="text-bbo underline">Google AI Studio</a>. Saved locally.</p>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1.5">Webhook
                        URL <span class="text-gray-700">(optional)</span></label>
                    <input type="text" id="webhookInput"
                        class="w-full bg-black border border-gray-800 rounded-xl p-3 text-white text-sm focus:outline-none focus:border-bbo transition"
                        placeholder="https://hook.us1.make.com/...">
                </div>
                <button id="saveSettingsBtn"
                    class="w-full py-3 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition text-sm">SAVE
                    SETTINGS</button>
                <button class="w-full py-2 text-gray-600 text-xs font-semibold"
                    onclick="document.getElementById('settingsModal').classList.add('hidden')">Cancel</button>
            </div>
        </div>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // ===== STATE =====
        const DB_NAME = 'bbo_rolodex';
        const DB_VERSION = 2;
        const STORE = 'leads';
        let db;
        let currentFilter = 'all';
        let stagedBase64 = null;
        let stagedMime = null;
        let stagedFull = null;
        let editingId = null; // null = new contact, number = editing existing

        const $ = id => document.getElementById(id);

        const ALL_LABELS = [
            { value: 'Lead', emoji: '💰' },
            { value: 'Content Day', emoji: '📸' },
            { value: 'Creator', emoji: '🎬' },
            { value: 'Partner', emoji: '🤝' },
            { value: 'Hoodie', emoji: '👕' },
            { value: 'Event', emoji: '🎤' },
            { value: 'Personal', emoji: '💜' },
            { value: 'Brand Ambassador', emoji: '🌟' },
            { value: 'Camera People', emoji: '📷' },
            { value: 'BBO Assistants', emoji: '🛠️' },
        ];

        // ===== INIT =====
        (async () => {
            buildLabelPills();
            await initDB();
            await migrateV1Data();
            await renderLeads();
            await updateStateCounts();
            loadSettings();
        })();

        // ===== BUILD LABEL PILLS =====
        function buildLabelPills() {
            var container = $('labelPills');
            container.innerHTML = ALL_LABELS.map(function (l) {
                return '<label class="label-pill cursor-pointer">' +
                    '<input type="checkbox" class="hidden" value="' + l.value + '">' +
                    '<div class="px-3 py-1.5 rounded-full border border-gray-800 text-xs font-semibold text-gray-500 transition select-none">' +
                    l.emoji + ' ' + l.value + '</div></label>';
            }).join('');
        }

        function getSelectedLabels() {
            var checks = $('labelPills').querySelectorAll('input[type="checkbox"]:checked');
            return Array.from(checks).map(function (c) { return c.value; });
        }

        function setSelectedLabels(labels) {
            var checks = $('labelPills').querySelectorAll('input[type="checkbox"]');
            checks.forEach(function (c) {
                c.checked = (labels || []).indexOf(c.value) !== -1;
            });
        }

        // ===== INDEXEDDB =====
        function initDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, DB_VERSION);
                req.onupgradeneeded = e => {
                    const d = e.target.result;
                    const tx = e.target.transaction;
                    if (!d.objectStoreNames.contains(STORE)) {
                        const s = d.createObjectStore(STORE, { keyPath: 'id', autoIncrement: true });
                        s.createIndex('handle', 'handle');
                        s.createIndex('urgency', 'urgency');
                        s.createIndex('category', 'category');
                        s.createIndex('created_at', 'created_at');
                        s.createIndex('name', 'name');
                        s.createIndex('state', 'state');
                    } else {
                        const s = tx.objectStore(STORE);
                        if (!s.indexNames.contains('name')) s.createIndex('name', 'name');
                        if (!s.indexNames.contains('state')) s.createIndex('state', 'state');
                    }
                };
                req.onsuccess = e => { db = e.target.result; resolve(); };
                req.onerror = e => reject(e);
            });
        }

        // Migrate v1 records: category string → labels array, add name field
        async function migrateV1Data() {
            var all = await dbGetAll();
            for (var i = 0; i < all.length; i++) {
                var lead = all[i];
                var needsUpdate = false;
                if (lead.category && !lead.labels) {
                    lead.labels = [lead.category];
                    needsUpdate = true;
                }
                if (!lead.name) {
                    lead.name = lead.handle || '';
                    needsUpdate = true;
                }
                if (needsUpdate) {
                    await dbPut(lead);
                }
            }
        }

        function dbAdd(lead) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).add(lead).onsuccess = e => resolve(e.target.result);
                tx.onerror = e => reject(e);
            });
        }

        function dbPut(lead) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).put(lead).onsuccess = e => resolve(e.target.result);
                tx.onerror = e => reject(e);
            });
        }

        function dbGetAll() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readonly');
                tx.objectStore(STORE).getAll().onsuccess = e => resolve(e.target.result);
                tx.onerror = e => reject(e);
            });
        }

        function dbDelete(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readwrite');
                tx.objectStore(STORE).delete(id).onsuccess = () => resolve();
                tx.onerror = e => reject(e);
            });
        }

        // ===== STATE HELPERS =====
        function isNJ(state) {
            if (!state) return false;
            var s = state.trim().toUpperCase();
            return s === 'NJ' || s === 'NEW JERSEY';
        }

        function isNY(state) {
            if (!state) return false;
            var s = state.trim().toUpperCase();
            return s === 'NY' || s === 'NEW YORK';
        }

        async function updateStateCounts() {
            var all = await dbGetAll();
            var nj = 0, ny = 0;
            all.forEach(function (l) {
                if (isNJ(l.state)) nj++;
                if (isNY(l.state)) ny++;
            });
            $('njCount').textContent = nj + ' contact' + (nj !== 1 ? 's' : '');
            $('nyCount').textContent = ny + ' contact' + (ny !== 1 ? 's' : '');
        }

        window.filterByState = function (state) {
            currentFilter = state;
            switchTab('leads');
            // Activate the correct filter chip
            document.querySelectorAll('.filter-chip').forEach(function (c) {
                c.classList.remove('active', 'bg-bbo', 'border-bbo', 'text-white');
                c.classList.add('border-gray-800', 'text-gray-500');
                if (c.dataset.filter === state) {
                    c.classList.add('active', 'bg-bbo', 'border-bbo', 'text-white');
                    c.classList.remove('border-gray-800', 'text-gray-500');
                }
            });
            renderLeads();
        };

        // ===== SETTINGS =====
        function loadSettings() {
            const key = localStorage.getItem('bbo_gemini_key');
            const webhook = localStorage.getItem('bbo_webhook');
            if (key) $('apiKeyInput').value = key;
            if (webhook) $('webhookInput').value = webhook;
            if (!key) $('settingsModal').classList.remove('hidden');
        }

        $('settingsBtn').addEventListener('click', () => $('settingsModal').classList.remove('hidden'));
        $('saveSettingsBtn').addEventListener('click', () => {
            const key = $('apiKeyInput').value.trim();
            if (!key) return toast('Enter an API key', true);
            localStorage.setItem('bbo_gemini_key', key);
            localStorage.setItem('bbo_webhook', $('webhookInput').value.trim());
            $('settingsModal').classList.add('hidden');
            toast('Settings saved');
        });

        // ===== TAB SWITCHING =====
        window.switchTab = function (tab) {
            if (tab === 'capture') {
                $('captureTab').classList.remove('hidden');
                $('leadsTab').classList.add('hidden');
                $('navCapture').classList.replace('text-gray-600', 'text-bbo');
                $('navLeads').classList.replace('text-bbo', 'text-gray-600');
                updateStateCounts();
            } else {
                $('captureTab').classList.add('hidden');
                $('leadsTab').classList.remove('hidden');
                $('navLeads').classList.replace('text-gray-600', 'text-bbo');
                $('navCapture').classList.replace('text-bbo', 'text-gray-600');
                renderLeads();
            }
        };

        // ===== DRAG & DROP =====
        const dropZone = $('dropZone');
        ['dragenter', 'dragover'].forEach(ev => {
            dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.add('drag-glow'); });
        });
        ['dragleave', 'drop'].forEach(ev => {
            dropZone.addEventListener(ev, e => { e.preventDefault(); dropZone.classList.remove('drag-glow'); });
        });
        dropZone.addEventListener('drop', e => {
            const f = e.dataTransfer.files[0];
            if (f && f.type.startsWith('image/')) stageScreenshot(f);
        });

        // FILE INPUT
        $('imageInput').addEventListener('change', e => {
            const f = e.target.files[0];
            if (f) stageScreenshot(f);
            $('imageInput').value = '';
        });

        // COMPRESS IMAGE
        function compressImage(file, maxSize) {
            maxSize = maxSize || 1024;
            return new Promise(function (resolve) {
                var img = new Image();
                var reader = new FileReader();
                reader.onload = function (e) {
                    img.onload = function () {
                        var canvas = document.createElement('canvas');
                        var w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
                            else { w = Math.round(w * maxSize / h); h = maxSize; }
                        }
                        canvas.width = w;
                        canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // STAGE SCREENSHOT
        async function stageScreenshot(file) {
            var compressed = await compressImage(file);
            stagedFull = compressed;
            stagedBase64 = compressed.split(',')[1];
            stagedMime = 'image/jpeg';
            $('stagedImg').src = compressed;
            $('stagedArea').classList.remove('hidden');
            $('dropZone').classList.add('hidden');
            $('parseBtn').disabled = false;
            $('parseHint').textContent = 'Screenshot ready — add notes if you want, then hit parse';
        }

        window.clearStaged = function () {
            stagedBase64 = null; stagedMime = null; stagedFull = null;
            $('stagedArea').classList.add('hidden');
            $('dropZone').classList.remove('hidden');
            $('parseBtn').disabled = true;
            $('parseHint').textContent = 'Drop a screenshot above to enable parsing';
        };

        // ===== SUBMIT CAPTURE =====
        window.submitCapture = async function () {
            if (!stagedBase64) return toast('Drop a screenshot first', true);
            showLoading(true);
            try {
                var notes = $('manualNotes').value.trim();
                var prompt = notes ? buildPromptWithNotes(notes) : buildPrompt();
                var data = await callGemini(prompt, stagedBase64, stagedMime);
                populateModal(data, stagedFull);
                clearStaged();
                $('manualNotes').value = '';
            } catch (err) {
                console.error('Parse error:', err);
                var msg = err.message || String(err);
                if (msg.indexOf('API key') > -1 || msg.indexOf('401') > -1 || msg.indexOf('403') > -1) msg = 'Invalid API key — tap ⚙️ to fix';
                else if (msg.indexOf('quota') > -1 || msg.indexOf('429') > -1) msg = 'API limit hit — wait a minute';
                else msg = msg.substring(0, 120);
                toast('❌ ' + msg, true);
            }
            showLoading(false);
        };

        // ===== GEMINI REST API =====
        async function callGemini(promptText, imageBase64, imageMime) {
            var apiKey = localStorage.getItem('bbo_gemini_key');
            if (!apiKey) throw new Error('No API key — tap ⚙️ Settings');

            var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;

            var body = {
                contents: [{
                    parts: [
                        { text: promptText },
                        { inline_data: { mime_type: imageMime, data: imageBase64 } }
                    ]
                }]
            };

            var resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!resp.ok) {
                var errorBody = await resp.text();
                throw new Error('API error ' + resp.status + ': ' + errorBody.substring(0, 200));
            }

            var json = await resp.json();
            var text = json.candidates[0].content.parts[0].text;
            return cleanJSON(text);
        }

        function buildPrompt() {
            return 'You are a CRM assistant for "Bad Bitches Only" (BBO), an urban lifestyle brand run by King Maker.\n\nAnalyze this screenshot of an Instagram DM or social media interaction. Extract as much as possible:\n{\n    "name": "their display name or real name if visible, otherwise empty string",\n    "handle": "the username without @",\n    "phone": "phone number if visible, otherwise empty string",\n    "email": "email address if visible, otherwise empty string",\n    "city": "city if mentioned or visible, otherwise empty string",\n    "state": "US state abbreviation if mentioned or visible (e.g. NJ, NY), otherwise empty string",\n    "labels": ["array of applicable labels from: Lead, Content Day, Creator, Partner, Hoodie, Event, Personal, Brand Ambassador, Camera People, BBO Assistants"],\n    "urgency": "hot (ready to buy/book), warm (interested), or cold (just browsing)",\n    "context": "1-2 sentence summary of what they want"\n}\n\nReturn ONLY valid JSON. No markdown, no code blocks. If a field is not visible, use empty string or empty array for labels.';
        }

        function buildPromptWithNotes(notes) {
            return 'You are a CRM assistant for "Bad Bitches Only" (BBO), an urban lifestyle brand run by King Maker.\n\nI\'m giving you TWO inputs about the SAME contact:\n1. A SCREENSHOT of a DM or social media interaction\n2. MY NOTES with extra context about this person\n\nCombine both to extract the most complete picture:\n{\n    "name": "their display name or real name if visible, otherwise empty string",\n    "handle": "the username without @ (prefer what you see in the screenshot)",\n    "phone": "phone number if visible or mentioned in notes, otherwise empty string",\n    "email": "email address if visible or mentioned in notes, otherwise empty string",\n    "city": "city if mentioned or visible, otherwise empty string",\n    "state": "US state abbreviation if mentioned or visible (e.g. NJ, NY), otherwise empty string",\n    "labels": ["array of applicable labels from: Lead, Content Day, Creator, Partner, Hoodie, Event, Personal, Brand Ambassador, Camera People, BBO Assistants"],\n    "urgency": "hot (ready to buy/book), warm (interested), or cold (just browsing)",\n    "context": "Combined 2-3 sentence summary using BOTH the screenshot AND my notes"\n}\n\nMY NOTES: "' + notes + '"\n\nReturn ONLY valid JSON. No markdown, no code blocks. If a field is not available, use empty string or empty array for labels.';
        }

        function cleanJSON(text) {
            try {
                var parsed = JSON.parse(text.replace(/```json/g, '').replace(/```/g, '').trim());
                // Normalize: ensure labels is an array
                if (parsed.category && !parsed.labels) {
                    parsed.labels = [parsed.category];
                }
                if (!Array.isArray(parsed.labels)) {
                    parsed.labels = parsed.labels ? [parsed.labels] : [];
                }
                return parsed;
            } catch (e) {
                return { name: '', handle: '', phone: '', email: '', city: '', state: '', labels: [], urgency: 'warm', context: text };
            }
        }

        // ===== CONTACT MODAL =====
        function openContactModal(contactData, screenshot) {
            editingId = null;
            resetModal();
            if (contactData) {
                populateModalFields(contactData, screenshot);
            }
            $('modalTitle').innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>NEW CONTACT';
            $('saveBtn').innerHTML = '💾 SAVE TO ROSTER';
            $('contactModal').classList.remove('hidden');
        }

        function openEditModal(lead) {
            editingId = lead.id;
            resetModal();
            populateModalFields(lead, lead.screenshot);
            $('modalTitle').innerHTML = '<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>EDIT CONTACT';
            $('saveBtn').innerHTML = '💾 UPDATE CONTACT';
            $('contactModal').classList.remove('hidden');
        }

        function resetModal() {
            $('resultName').value = '';
            $('resultHandle').value = '';
            $('resultPhone').value = '';
            $('resultEmail').value = '';
            $('resultCity').value = '';
            $('resultState').value = '';
            $('resultContext').value = '';
            setSelectedLabels([]);
            document.querySelector('input[name="urgency"][value="warm"]').checked = true;
            $('modalPreviewWrap').classList.add('hidden');
        }

        function populateModalFields(data, screenshot) {
            $('resultName').value = data.name || '';
            $('resultHandle').value = (data.handle || '').replace('@', '');
            $('resultPhone').value = data.phone || '';
            $('resultEmail').value = data.email || '';
            $('resultCity').value = data.city || '';
            $('resultState').value = data.state || '';
            $('resultContext').value = data.context || '';

            // Labels
            var labels = data.labels || [];
            if (!labels.length && data.category) labels = [data.category];
            setSelectedLabels(labels);

            // Urgency
            var urg = data.urgency || 'warm';
            var radio = document.querySelector('input[name="urgency"][value="' + urg + '"]');
            if (radio) radio.checked = true;

            // Screenshot
            if (screenshot) {
                $('modalPreviewWrap').classList.remove('hidden');
                $('modalPreview').src = screenshot;
            } else {
                $('modalPreviewWrap').classList.add('hidden');
            }
        }

        function populateModal(data, screenshot) {
            editingId = null;
            resetModal();
            populateModalFields(data, screenshot);
            $('modalTitle').innerHTML = '<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>EXTRACTED DATA';
            $('saveBtn').innerHTML = '💾 SAVE TO ROSTER';
            $('contactModal').classList.remove('hidden');
        }

        $('closeModal').addEventListener('click', function () {
            $('contactModal').classList.add('hidden');
            editingId = null;
            stagedFull = null;
        });

        // ===== SAVE =====
        $('saveBtn').addEventListener('click', async function () {
            var name = $('resultName').value.trim();
            var handle = $('resultHandle').value.trim();
            if (!name && !handle) return toast('Enter at least a name', true);

            var urgencyEl = document.querySelector('input[name="urgency"]:checked');
            var labels = getSelectedLabels();

            var lead = {
                name: name,
                handle: handle ? '@' + handle.replace('@', '') : '',
                phone: $('resultPhone').value.trim(),
                email: $('resultEmail').value.trim(),
                city: $('resultCity').value.trim(),
                state: $('resultState').value.trim(),
                labels: labels,
                category: labels[0] || '', // backward compat
                urgency: urgencyEl ? urgencyEl.value : 'warm',
                context: $('resultContext').value.trim(),
                screenshot: stagedFull || null,
                source: editingId ? 'edited' : (stagedFull ? 'screenshot' : 'manual'),
                created_at: new Date().toISOString()
            };

            if (editingId) {
                lead.id = editingId;
                // Preserve original created_at and screenshot if not changing
                var existing = await dbGetById(editingId);
                if (existing) {
                    lead.created_at = existing.created_at;
                    if (!lead.screenshot && existing.screenshot) lead.screenshot = existing.screenshot;
                }
                await dbPut(lead);
                toast('Contact updated');
            } else {
                await dbAdd(lead);
                // Webhook
                var webhookUrl = localStorage.getItem('bbo_webhook');
                if (webhookUrl) {
                    try {
                        await fetch(webhookUrl, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: lead.name, handle: lead.handle, phone: lead.phone, email: lead.email, city: lead.city, state: lead.state, labels: lead.labels, urgency: lead.urgency, context: lead.context, timestamp: lead.created_at })
                        });
                    } catch (e) { console.warn('Webhook failed:', e); }
                }
                toast('Saved to The Roster! 🔥');
            }

            $('contactModal').classList.add('hidden');
            editingId = null;
            stagedFull = null;
            await renderLeads();
            await updateStateCounts();
        });

        function dbGetById(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(STORE, 'readonly');
                tx.objectStore(STORE).get(id).onsuccess = e => resolve(e.target.result);
                tx.onerror = e => reject(e);
            });
        }

        // ===== COPY =====
        $('copyBtn').addEventListener('click', function () {
            var parts = [];
            var name = $('resultName').value.trim();
            var handle = $('resultHandle').value.trim();
            if (name) parts.push('Name: ' + name);
            if (handle) parts.push('Handle: @' + handle);
            var phone = $('resultPhone').value.trim();
            if (phone) parts.push('Phone: ' + phone);
            var email = $('resultEmail').value.trim();
            if (email) parts.push('Email: ' + email);
            var city = $('resultCity').value.trim();
            var state = $('resultState').value.trim();
            if (city || state) parts.push('Location: ' + [city, state].filter(Boolean).join(', '));
            var labels = getSelectedLabels();
            if (labels.length) parts.push('Labels: ' + labels.join(', '));
            var urg = (document.querySelector('input[name="urgency"]:checked') || {}).value;
            if (urg) parts.push('Urgency: ' + urg);
            var ctx = $('resultContext').value.trim();
            if (ctx) parts.push('Context: ' + ctx);
            navigator.clipboard.writeText(parts.join('\n'));
            $('copyBtn').textContent = '✅ COPIED';
            setTimeout(function () { $('copyBtn').innerHTML = '📋 COPY'; }, 1500);
        });

        // ===== RENDER LEADS =====
        async function renderLeads() {
            var all = await dbGetAll();
            $('leadCount').textContent = all.length;
            var search = ($('searchInput') ? $('searchInput').value : '').toLowerCase();
            var filtered = all.filter(function (l) {
                var labels = l.labels || (l.category ? [l.category] : []);
                var searchText = [l.name, l.handle, l.context, l.phone, l.email, l.city, l.state].concat(labels).join(' ').toLowerCase();
                if (search && searchText.indexOf(search) === -1) return false;
                if (currentFilter === 'all') return true;
                if (currentFilter === 'hot' || currentFilter === 'warm' || currentFilter === 'cold') return l.urgency === currentFilter;
                if (currentFilter === 'NJ') return isNJ(l.state);
                if (currentFilter === 'NY') return isNY(l.state);
                return labels.indexOf(currentFilter) !== -1;
            });
            filtered.sort(function (a, b) { return new Date(b.created_at) - new Date(a.created_at); });
            var grid = $('leadsGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="text-center py-16 text-gray-600"><p class="text-3xl mb-3">📋</p><p class="font-bold text-gray-500">' + (all.length === 0 ? 'No contacts yet' : 'No matches') + '</p></div>';
                return;
            }
            grid.innerHTML = filtered.map(function (l) {
                var d = new Date(l.created_at);
                var date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                var time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                function esc(t) { var el = document.createElement('div'); el.textContent = t || ''; return el.innerHTML; }
                var urgClass = l.urgency === 'hot' ? 'bg-bbo/15 text-bbo' : l.urgency === 'warm' ? 'bg-yellow-500/15 text-yellow-400' : 'bg-blue-500/15 text-blue-400';
                var labels = l.labels || (l.category ? [l.category] : []);

                // Name line
                var nameDisplay = esc(l.name || l.handle || 'Unnamed');
                var handleDisplay = l.handle ? '<span class="text-bbo text-xs font-mono ml-1">' + esc(l.handle) + '</span>' : '';

                // Location line
                var locParts = [l.city, l.state].filter(Boolean);
                var locDisplay = locParts.length ? '<span class="text-[10px] text-gray-500">📍 ' + esc(locParts.join(', ')) + '</span>' : '';

                // Contact info
                var contactBits = [];
                if (l.phone) contactBits.push('📱 ' + esc(l.phone));
                if (l.email) contactBits.push('✉️ ' + esc(l.email));
                var contactDisplay = contactBits.length ? '<div class="flex flex-wrap gap-3 text-[10px] text-gray-500">' + contactBits.join('') + '</div>' : '';

                // Label pills
                var labelHtml = labels.map(function (lb) {
                    return '<span class="inline-block text-[10px] font-semibold px-2 py-0.5 rounded bg-gray-800 text-gray-400">' + esc(lb) + '</span>';
                }).join(' ');

                return '<div class="card-in bg-gray-900/60 border border-gray-800 rounded-xl p-4 space-y-2 cursor-pointer" onclick="window._editLead(' + l.id + ')">' +
                    '<div class="flex justify-between items-start"><div class="flex items-center flex-wrap gap-1"><span class="font-bold text-sm text-white">' + nameDisplay + '</span>' + handleDisplay + '</div><span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded-full shrink-0 ' + urgClass + '">' + l.urgency + '</span></div>' +
                    (locDisplay ? '<div>' + locDisplay + '</div>' : '') +
                    contactDisplay +
                    (labelHtml ? '<div class="flex flex-wrap gap-1">' + labelHtml + '</div>' : '') +
                    '<p class="text-xs text-gray-400 leading-relaxed">' + (esc(l.context) || '<span class="text-gray-600">No notes</span>') + '</p>' +
                    '<div class="flex justify-between items-center pt-1 border-t border-gray-800/50"><span class="text-[10px] text-gray-600">' + date + ' · ' + time + '</span>' +
                    '<button onclick="event.stopPropagation(); window._deleteLead(' + l.id + ')" class="text-[10px] text-red-500/60 hover:text-red-400 font-semibold transition">DELETE</button></div></div>';
            }).join('');
        }

        window._editLead = async function (id) {
            var lead = await dbGetById(id);
            if (lead) openEditModal(lead);
        };

        window._deleteLead = async function (id) {
            if (!confirm('Delete this contact?')) return;
            await dbDelete(id);
            toast('Contact deleted');
            await renderLeads();
            await updateStateCounts();
        };

        // ===== FILTERS =====
        document.querySelectorAll('.filter-chip').forEach(function (chip) {
            chip.addEventListener('click', function () {
                document.querySelectorAll('.filter-chip').forEach(function (c) {
                    c.classList.remove('active', 'bg-bbo', 'border-bbo', 'text-white');
                    c.classList.add('border-gray-800', 'text-gray-500');
                });
                chip.classList.add('active', 'bg-bbo', 'border-bbo', 'text-white');
                chip.classList.remove('border-gray-800', 'text-gray-500');
                currentFilter = chip.dataset.filter;
                renderLeads();
            });
        });
        var firstChip = document.querySelector('.filter-chip.active');
        if (firstChip) { firstChip.classList.add('bg-bbo', 'border-bbo', 'text-white'); firstChip.classList.remove('border-gray-800', 'text-gray-500'); }
        if ($('searchInput')) $('searchInput').addEventListener('input', function () { renderLeads(); });

        // ===== EXPORT =====
        window.exportCSV = async function () {
            var leads = await dbGetAll();
            if (!leads.length) return toast('No contacts to export', true);
            var headers = ['Name', 'Handle', 'Phone', 'Email', 'City', 'State', 'Labels', 'Urgency', 'Context', 'Date'];
            var rows = leads.map(function (l) {
                var labels = (l.labels || (l.category ? [l.category] : [])).join('; ');
                return [
                    '"' + (l.name || '').replace(/"/g, '""') + '"',
                    l.handle || '',
                    l.phone || '',
                    l.email || '',
                    l.city || '',
                    l.state || '',
                    '"' + labels.replace(/"/g, '""') + '"',
                    l.urgency || '',
                    '"' + (l.context || '').replace(/"/g, '""') + '"',
                    new Date(l.created_at).toLocaleString()
                ];
            });
            var csv = [headers.join(',')].concat(rows.map(function (r) { return r.join(','); })).join('\n');
            var blob = new Blob([csv], { type: 'text/csv' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url; a.download = 'bbo_rolodex_' + new Date().toISOString().slice(0, 10) + '.csv';
            a.click(); URL.revokeObjectURL(url);
            toast('CSV exported 📥');
        };

        // ===== HELPERS =====
        function showLoading(show) { $('loadingState').classList.toggle('hidden', !show); }
        function toast(msg, isError) {
            $('toastIcon').textContent = isError ? '❌' : '✅';
            $('toastMsg').textContent = msg;
            $('toast').classList.add('show');
            setTimeout(function () { $('toast').classList.remove('show'); }, 3000);
        }
    </script>
</body>

</html>
